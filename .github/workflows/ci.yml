name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  infra-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.1

      - name: Lint — enableRbacAuthorization must not depend on skip flags
        run: |
          if grep -rn 'enableRbacAuthorization.*skip\|enableRbacAuthorization.*Skip' infra/; then
            echo "FAIL: enableRbacAuthorization is coupled to a skip flag. Key Vault must always use RBAC (invariant #1)."
            exit 1
          fi

      - name: Lint — KV secret child resources must have dependsOn when KV is conditional
        run: |
          # Warn if any KV secret uses parent: keyVaultRef without a nearby dependsOn
          if grep -n 'parent: keyVaultRef' infra/azure/main.bicep | grep -v '//' > /dev/null 2>&1; then
            if ! grep -n 'dependsOn.*keyVault' infra/azure/main.bicep > /dev/null 2>&1; then
              echo "FAIL: KV secret uses parent: keyVaultRef but no dependsOn: [keyVault] found. ARM ordering not guaranteed (invariant #4)."
              exit 1
            fi
          fi

      - name: Lint — role assignment GUIDs must include roleAssignmentSalt
        run: |
          # principalId cannot be used in Bicep GUID seeds (runtime value, not known at deployment start).
          # Instead we use roleAssignmentSalt as a manual escape hatch — verify it is wired up.
          if grep -A2 "Microsoft.Authorization/roleAssignments" infra/azure/main.bicep | grep -E "name: guid\(" | grep -v "roleAssignmentSalt" | grep -v "//"; then
            echo "FAIL: Role assignment GUID does not include roleAssignmentSalt. Add it so GUIDs can be reset if App Services are recreated without RG deletion (invariant #5)."
            exit 1
          fi

      - name: Lint — KV role assignment failures must not be suppressed
        run: |
          # Only flag KV-specific role assignments — backup vault reader assignments may legitimately suppress output.
          if grep -n 'az role assignment.*KeyVault\|az role assignment.*kv\|az role assignment.*key.vault' scripts/ -i | grep -i '2>.*null\|Out-Null\|SilentlyContinue'; then
            echo "FAIL: Key Vault role assignment failure is suppressed. Surface errors in production (invariant #6)."
            exit 1
          fi

      - name: Lint — PowerShell URL strings must use braces around variables before query params
        run: |
          # Catch patterns like "$varName?query" which PS parses as single variable $varName?query
          if grep -rn '"\$[A-Za-z][A-Za-z0-9]*?' scripts/ | grep -v '\${'; then
            echo "FAIL: PowerShell variable in URL string before '?' without braces. Use \${varName}?query to avoid silent empty substitution."
            exit 1
          fi

      - name: Lint — destructive Azure scripts must assert subscription before acting
        run: |
          # Any script that performs az webapp delete / az resource delete / az group delete /
          # az deployment group create must first verify the current subscription matches an
          # explicit param (defense against the May 2026 wrong-subscription incident). See #420.
          fail=0
          for script in scripts/azure/deactivate-app-layer.ps1 scripts/azure/deploy-environment.ps1 scripts/azure/activate-staging-app-layer.ps1; do
            [ -f "$script" ] || continue
            if grep -qE 'az (webapp|resource|group) delete|az deployment group create' "$script"; then
              # Either an explicit assertion against `az account show --query id` OR az account set
              # to a parameter-passed subscription is acceptable. Bare `az account set` without
              # subscription validation isn't enough.
              if ! grep -qE 'az account show.*--query.*id|currentSubscription.*-ne.*SubscriptionId' "$script"; then
                echo "FAIL: $script performs destructive az operations but lacks subscription assertion. Add a check that fails before acting if az context doesn't match expected subscription."
                fail=1
              fi
            fi
          done
          exit $fail

      - name: Lint — actionlint (GitHub Actions workflow syntax + context references)
        run: |
          # actionlint catches typos in context properties (github.evnt.foo),
          # undefined input/secret references, invalid `uses:` values, and many
          # other workflow-level errors before they hit prod.
          # See https://github.com/rhysd/actionlint
          # -shellcheck= disables the shellcheck integration; it auto-detects shellcheck on
          # GitHub runners and flags style/info-level warnings as failures (noise, not bugs).
          # Shell style can be lint-checked separately if we want it.
          curl -sLO https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash
          bash download-actionlint.bash 1.7.12
          ./actionlint -color -shellcheck=

  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.1

      - name: Setup Node
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start PostgreSQL test environment
        run: npm run postgres:setup

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Type check
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Destroy PostgreSQL test environment
        if: always()
        run: npm run postgres:destroy
