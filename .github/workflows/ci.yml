name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  infra-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.1

      - name: Lint — enableRbacAuthorization must not depend on skip flags
        run: |
          if grep -rn 'enableRbacAuthorization.*skip\|enableRbacAuthorization.*Skip' infra/; then
            echo "FAIL: enableRbacAuthorization is coupled to a skip flag. Key Vault must always use RBAC (invariant #1)."
            exit 1
          fi

      - name: Lint — KV secret child resources must have dependsOn when KV is conditional
        run: |
          # Warn if any KV secret uses parent: keyVaultRef without a nearby dependsOn
          if grep -n 'parent: keyVaultRef' infra/azure/main.bicep | grep -v '//' > /dev/null 2>&1; then
            if ! grep -n 'dependsOn.*keyVault' infra/azure/main.bicep > /dev/null 2>&1; then
              echo "FAIL: KV secret uses parent: keyVaultRef but no dependsOn: [keyVault] found. ARM ordering not guaranteed (invariant #4)."
              exit 1
            fi
          fi

      - name: Lint — role assignment GUIDs must be stable (#406)
        run: |
          # Role assignment GUIDs MUST be derived from stable inputs (subscription().subscriptionId + environmentName +
          # a per-assignment suffix string), NOT from resource IDs like webApp.id or kvSecret*.id which change when
          # the resource is recreated. Unstable GUIDs cause RoleAssignmentExists 409 conflicts on RG-recreate (#406).
          # The roleAssignmentSalt escape hatch must still be wired up as a 4th argument for emergency GUID resets.
          set -e
          # Match the resource declaration line, then take the following 3 lines to capture scope + name + properties opener.
          # Role assignment 'name:' values come in two shapes:
          #   1. `name: guid(...)`                                        — without escape-hatch salt
          #   2. `name: empty(roleAssignmentSalt) ? guid(...) : guid(...)` — with escape-hatch (our standard form)
          ROLE_ASSIGN_LINES=$(grep -A3 "resource.*'Microsoft.Authorization/roleAssignments" infra/azure/main.bicep | grep -E "^\s*name: (guid\(|empty\(roleAssignmentSalt\))" | grep -v "//")
          if [ -z "$ROLE_ASSIGN_LINES" ]; then
            echo "FAIL: No role assignment 'name:' lines found — refusing to silently pass."
            exit 1
          fi
          # Each name line must include subscription().subscriptionId AND environmentName.
          BAD=$(echo "$ROLE_ASSIGN_LINES" | grep -v "subscription().subscriptionId" || true)
          if [ -n "$BAD" ]; then
            echo "FAIL: Role assignment GUID does not include subscription().subscriptionId — must use stable inputs (#406):"
            echo "$BAD"
            exit 1
          fi
          BAD=$(echo "$ROLE_ASSIGN_LINES" | grep -v "environmentName" || true)
          if [ -n "$BAD" ]; then
            echo "FAIL: Role assignment GUID does not include environmentName — must use stable inputs (#406):"
            echo "$BAD"
            exit 1
          fi
          # Each line must also wire up the roleAssignmentSalt escape hatch (4th guid arg in the non-empty branch).
          BAD=$(echo "$ROLE_ASSIGN_LINES" | grep -v "roleAssignmentSalt" || true)
          if [ -n "$BAD" ]; then
            echo "FAIL: Role assignment GUID does not wire up roleAssignmentSalt escape hatch (invariant #5):"
            echo "$BAD"
            exit 1
          fi
          # Forbid resource-id seeds (webApp.id, workerApp.id, parserApp.id, kvSecret*.id) — they are unstable.
          BAD=$(echo "$ROLE_ASSIGN_LINES" | grep -E "webApp\.id|workerApp\.id|parserApp\.id|kvSecret[A-Za-z]*\.id" || true)
          if [ -n "$BAD" ]; then
            echo "FAIL: Role assignment GUID uses an ARM resource .id seed — these are NOT stable across RG-recreate (#406):"
            echo "$BAD"
            exit 1
          fi

      - name: Lint — KV role assignment failures must not be suppressed
        run: |
          # Only flag KV-specific role assignments — backup vault reader assignments may legitimately suppress output.
          if grep -n 'az role assignment.*KeyVault\|az role assignment.*kv\|az role assignment.*key.vault' scripts/ -i | grep -i '2>.*null\|Out-Null\|SilentlyContinue'; then
            echo "FAIL: Key Vault role assignment failure is suppressed. Surface errors in production (invariant #6)."
            exit 1
          fi

      - name: Lint — PowerShell URL strings must use braces around variables before query params
        run: |
          # Catch patterns like "$varName?query" which PS parses as single variable $varName?query
          if grep -rn '"\$[A-Za-z][A-Za-z0-9]*?' scripts/ | grep -v '\${'; then
            echo "FAIL: PowerShell variable in URL string before '?' without braces. Use \${varName}?query to avoid silent empty substitution."
            exit 1
          fi

      - name: Lint — destructive Azure scripts must assert subscription before acting
        run: |
          # Any script that performs az webapp delete / az resource delete / az group delete /
          # az deployment group create must first verify the current subscription matches an
          # explicit param (defense against the May 2026 wrong-subscription incident). See #420.
          fail=0
          for script in scripts/azure/deactivate-app-layer.ps1 scripts/azure/deploy-environment.ps1 scripts/azure/activate-staging-app-layer.ps1; do
            [ -f "$script" ] || continue
            if grep -qE 'az (webapp|resource|group) delete|az deployment group create' "$script"; then
              # Either an explicit assertion against `az account show --query id` OR az account set
              # to a parameter-passed subscription is acceptable. Bare `az account set` without
              # subscription validation isn't enough.
              if ! grep -qE 'az account show.*--query.*id|currentSubscription.*-ne.*SubscriptionId' "$script"; then
                echo "FAIL: $script performs destructive az operations but lacks subscription assertion. Add a check that fails before acting if az context doesn't match expected subscription."
                fail=1
              fi
            fi
          done
          exit $fail

      - name: Lint — actionlint (GitHub Actions workflow syntax + context references)
        run: |
          # actionlint catches typos in context properties (github.evnt.foo),
          # undefined input/secret references, invalid `uses:` values, and many
          # other workflow-level errors before they hit prod.
          # See https://github.com/rhysd/actionlint
          # -shellcheck= disables the shellcheck integration; it auto-detects shellcheck on
          # GitHub runners and flags style/info-level warnings as failures (noise, not bugs).
          # Shell style can be lint-checked separately if we want it.
          curl -sLO https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash
          bash download-actionlint.bash 1.7.12
          ./actionlint -color -shellcheck=

  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.1

      - name: Setup Node
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start PostgreSQL test environment
        run: npm run postgres:setup

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Type check
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Destroy PostgreSQL test environment
        if: always()
        run: npm run postgres:destroy

  pester:
    # Pester v5 unit tests for scripts/azure/deploy-environment.helpers.ps1 (#434).
    # Cheap (<60s) and catches the kind of footguns that cost 3 deploy cycles on 2026-05-19
    # (see doc/DEPLOY_OPTIMIZATION.md 2026-05-19 cascade).
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.1

      - name: Run Pester tests
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck -Scope CurrentUser
          Import-Module Pester -MinimumVersion 5.5.0 -Force
          $config = New-PesterConfiguration
          $config.Run.Path = 'test/scripts/'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'test/scripts/pester-results.xml'
          Invoke-Pester -Configuration $config

  playwright:
    # Admin-content Playwright e2e suite (#432). Runs 24 mocked-browser tests against
    # the static server defined in playwright.admin-content.config.ts. Catches UX
    # regressions like the v1.1.54 silent ReferenceError that prompted #432.
    # Total runtime ~90s including browser install (~30s with caching).
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.1

      - name: Setup Node
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run admin-content e2e suite
        run: npm run test:e2e:admin-content

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
