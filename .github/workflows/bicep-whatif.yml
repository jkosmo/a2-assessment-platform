name: Bicep what-if (staging)

on:
  pull_request:
    paths:
      - 'infra/azure/main.bicep'
      - 'scripts/azure/deploy-environment.ps1'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  whatif-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Azure login (OIDC)
        uses: azure/login@v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run Bicep what-if
        id: whatif
        run: |
          output=$(az deployment group what-if \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/azure/main.bicep \
            --mode Incremental \
            --no-pretty-print \
            --parameters \
              environmentName=staging \
              location="${{ vars.AZURE_LOCATION }}" \
              appNamePrefix="${{ vars.AZURE_APP_NAME_PREFIX }}" \
              appServiceSkuName="${{ vars.AZURE_APP_SERVICE_SKU }}" \
              postgresAdministratorLogin="${{ vars.POSTGRES_ADMIN_USERNAME }}" \
              postgresAdministratorPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
              postgresDatabaseName="${{ vars.POSTGRES_DATABASE_NAME }}" \
              postgresVersion="${{ vars.POSTGRES_VERSION }}" \
              postgresSkuName="${{ vars.POSTGRES_SKU_NAME }}" \
              postgresSkuTier="${{ vars.POSTGRES_SKU_TIER }}" \
              parserWorkerAuthKey="whatif-only-placeholder-not-deployed" \
              deployPrincipalId="${{ vars.DEPLOY_PRINCIPAL_ID }}" \
              skipRoleAssignments="${{ vars.SKIP_ROLE_ASSIGNMENTS || 'false' }}" \
            2>&1 || true)
          # #472: the diff can be hundreds of KB. Passing it through an env var to github-script
          # spawns node with an oversized environment → "Argument list too long" (E2BIG). Write it
          # to a file and have the comment step read it via fs (only the small path goes through env).
          printf '%s' "$output" > "$RUNNER_TEMP/whatif-staging.txt"

      - name: Post what-if result as PR comment
        uses: actions/github-script@v9.0.0
        # #472: read the diff from a file (not env/template-literal). Env passing broke twice —
        # first on backticks/${ /control chars, then on E2BIG for large diffs (KQL alert rules).
        env:
          WHATIF_FILE: ${{ runner.temp }}/whatif-staging.txt
        with:
          script: |
            const fs = require('fs');
            let result = '';
            try { result = fs.readFileSync(process.env.WHATIF_FILE, 'utf8'); }
            catch { result = '(what-if output unavailable — see the workflow logs)'; }
            const body = [
              '## Bicep what-if — staging',
              '',
              'Changes that would be applied to `rg-a2-assessment-staging` if this PR is merged:',
              '',
              '```',
              result.slice(0, 60000),
              '```',
              '',
              '_This is informational. A green what-if does not guarantee runtime correctness — verify `/healthz` after staging deploy._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.startsWith('## Bicep what-if — staging')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
