name: Activate Staging App Layer

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: activate-staging-app-layer-${{ github.ref }}
  cancel-in-progress: false

jobs:
  activate-staging-app-layer:
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build deployment package
        id: package
        shell: bash
        run: |
          set -euo pipefail
          package_path="$RUNNER_TEMP/a2-assessment-staging.zip"
          package_root="$RUNNER_TEMP/a2-assessment-package"
          rm -rf "$package_root" "$package_path"
          mkdir -p "$package_root"
          git archive --format=tar HEAD | tar -x -C "$package_root"
          cd "$package_root"
          npm ci --ignore-scripts
          npm run prisma:generate
          npm run build
          npm prune --omit=dev --ignore-scripts
          zip -r -q "$package_path" .
          echo "path=$package_path" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Start staging PostgreSQL compute
        shell: pwsh
        run: |
          ./scripts/azure/set-postgres-compute-state.ps1 `
            -SubscriptionId "${{ secrets.AZURE_SUBSCRIPTION_ID }}" `
            -EnvironmentName "staging" `
            -Action "start" `
            -ResourceGroupName "${{ vars.AZURE_RESOURCE_GROUP }}"

      - name: Activate staging app layer
        shell: pwsh
        run: |
          ./scripts/azure/deploy-environment.ps1 `
            -SubscriptionId "${{ secrets.AZURE_SUBSCRIPTION_ID }}" `
            -EnvironmentName "staging" `
            -Location "${{ vars.AZURE_LOCATION }}" `
            -ResourceGroupName "${{ vars.AZURE_RESOURCE_GROUP }}" `
            -AppNamePrefix "${{ vars.AZURE_APP_NAME_PREFIX }}" `
            -AppServiceSkuName "${{ vars.AZURE_APP_SERVICE_SKU }}" `
            -CostCenter "${{ vars.AZURE_COST_CENTER }}" `
            -Owner "${{ vars.AZURE_OWNER }}" `
            -PostgresAdministratorLogin "${{ vars.POSTGRES_ADMIN_USERNAME || 'a2platformadmin' }}" `
            -PostgresAdministratorPassword "${{ secrets.POSTGRES_ADMIN_PASSWORD }}" `
            -PostgresDatabaseName "${{ vars.POSTGRES_DATABASE_NAME || 'a2assessment' }}" `
            -PostgresVersion "${{ vars.POSTGRES_VERSION || '16' }}" `
            -PostgresSkuName "${{ vars.POSTGRES_SKU_NAME || 'Standard_B1ms' }}" `
            -PostgresSkuTier "${{ vars.POSTGRES_SKU_TIER || 'Burstable' }}" `
            -PostgresStorageSizeGB "${{ vars.POSTGRES_STORAGE_SIZE_GB || '32' }}" `
            -PostgresBackupRetentionDays "${{ vars.POSTGRES_BACKUP_RETENTION_DAYS || '7' }}" `
            -PostgresGeoRedundantBackup "${{ vars.POSTGRES_GEO_REDUNDANT_BACKUP || 'Disabled' }}" `
            -PostgresHighAvailabilityMode "${{ vars.POSTGRES_HIGH_AVAILABILITY_MODE || 'Disabled' }}" `
            -AuthMode "${{ vars.AUTH_MODE || 'entra' }}" `
            -EntraTenantId "${{ vars.ENTRA_TENANT_ID }}" `
            -EntraClientId "${{ vars.ENTRA_CLIENT_ID }}" `
            -EntraAudience "${{ vars.ENTRA_AUDIENCE }}" `
            -EntraSyncGroupRoles "${{ vars.ENTRA_SYNC_GROUP_ROLES }}" `
            -EntraGroupRoleMapJson '${{ vars.ENTRA_GROUP_ROLE_MAP_JSON }}' `
            -LlmMode "${{ vars.LLM_MODE }}" `
            -LlmStubModelName "${{ vars.LLM_STUB_MODEL_NAME }}" `
            -AzureOpenAiEndpoint "${{ vars.AZURE_OPENAI_ENDPOINT }}" `
            -AzureOpenAiApiKey "${{ secrets.AZURE_OPENAI_API_KEY }}" `
            -AzureOpenAiDeployment "${{ vars.AZURE_OPENAI_DEPLOYMENT }}" `
            -AzureOpenAiApiVersion "${{ vars.AZURE_OPENAI_API_VERSION || '2024-10-21' }}" `
            -AzureOpenAiTimeoutMs "${{ vars.AZURE_OPENAI_TIMEOUT_MS || '120000' }}" `
            -AzureOpenAiTemperature "${{ vars.AZURE_OPENAI_TEMPERATURE || '0' }}" `
            -AzureOpenAiMaxTokens "${{ vars.AZURE_OPENAI_MAX_TOKENS || '1200' }}" `
            -AzureOpenAiTokenLimitParameter "${{ vars.AZURE_OPENAI_TOKEN_LIMIT_PARAMETER || 'auto' }}" `
            -AzureOpenAiAuthoringTokenLimitParameter "${{ vars.AZURE_OPENAI_AUTHORING_TOKEN_LIMIT_PARAMETER || '' }}" `
            -SkipRoleAssignments:"${{ vars.SKIP_ROLE_ASSIGNMENTS == 'true' }}" `
            -AssessmentJobPollIntervalMs "${{ vars.ASSESSMENT_JOB_POLL_INTERVAL_MS }}" `
            -AssessmentJobMaxAttempts "${{ vars.ASSESSMENT_JOB_MAX_ATTEMPTS }}" `
            -ObservabilityAlertEmail "${{ vars.OBSERVABILITY_ALERT_EMAIL }}" `
            -QueueBacklogAlertThreshold "${{ vars.QUEUE_BACKLOG_ALERT_THRESHOLD || '5' }}" `
            -LatencyAlertThresholdSeconds "${{ vars.LATENCY_ALERT_THRESHOLD_SECONDS || '3' }}" `
            -AppealOverdueAlertThreshold "${{ vars.APPEAL_OVERDUE_ALERT_THRESHOLD || '1' }}" `
            -AppealSlaMonitorIntervalMs "${{ vars.APPEAL_SLA_MONITOR_INTERVAL_MS || '600000' }}" `
            -ParticipantNotificationChannel "${{ vars.PARTICIPANT_NOTIFICATION_CHANNEL || 'log' }}" `
            -ParticipantNotificationWebhookUrl "${{ secrets.PARTICIPANT_NOTIFICATION_WEBHOOK_URL }}" `
            -ParticipantNotificationWebhookTimeoutMs "${{ vars.PARTICIPANT_NOTIFICATION_WEBHOOK_TIMEOUT_MS || '5000' }}" `
            -AcsEmailSenderDisplayName "${{ vars.ACS_EMAIL_SENDER_DISPLAY_NAME || 'A2 Assessment Platform' }}" `
            -BudgetContactEmail "${{ vars.BUDGET_CONTACT_EMAIL }}" `
            -MonthlyBudgetAmount "${{ vars.MONTHLY_BUDGET_AMOUNT }}" `
            -ParserWorkerAuthKey "${{ secrets.PARSER_WORKER_AUTH_KEY }}" `
            -PackagePath "${{ steps.package.outputs.path }}"

      - name: Verify staging app layer
        shell: pwsh
        run: |
          $resourceGroup = "${{ vars.AZURE_RESOURCE_GROUP }}"
          $postgresServerState = (az postgres flexible-server list `
            --resource-group $resourceGroup `
            --query "[?tags.environment=='staging'].state | [0]" `
            --output tsv).Trim()
          if ($postgresServerState -ne "Ready") {
            throw "Expected staging PostgreSQL server to be Ready, but found '$postgresServerState'."
          }

          $webAppCount = [int](az webapp list `
            --resource-group $resourceGroup `
            --query "length(@)" `
            --output tsv)
          if ($webAppCount -lt 3) {
            throw "Expected at least 3 staging web apps after activation, but found $webAppCount."
          }

          $planCount = [int](az appservice plan list `
            --resource-group $resourceGroup `
            --query "length(@)" `
            --output tsv)
          if ($planCount -lt 1) {
            throw "Expected an App Service plan after activation, but none was found."
          }

          $disabledScheduledQueryRuleCount = [int](az resource list `
            --resource-group $resourceGroup `
            --resource-type Microsoft.Insights/scheduledQueryRules `
            --query "[?properties.enabled!=\`true\`] | length(@)" `
            --output tsv)
          if ($disabledScheduledQueryRuleCount -ne 0) {
            throw "Expected all scheduled query rules to be enabled after activation, but found $disabledScheduledQueryRuleCount disabled."
          }

          $metricAlertCount = [int](az resource list `
            --resource-group $resourceGroup `
            --resource-type Microsoft.Insights/metricAlerts `
            --query "length(@)" `
            --output tsv)
          if ($metricAlertCount -lt 2) {
            throw "Expected metric alerts to be recreated after activation, but found $metricAlertCount."
          }

      - name: Summarize result
        run: |
          echo "Staging app layer activated from ref: $DEPLOY_REF" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "PostgreSQL compute was started before deploy, then the normal staging deployment recreated the App Service layer." >> "$GITHUB_STEP_SUMMARY"
          echo "Verification confirmed PostgreSQL, App Service, and alert resources were restored." >> "$GITHUB_STEP_SUMMARY"
        env:
          DEPLOY_REF: ${{ github.ref }}
