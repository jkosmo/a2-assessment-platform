name: Deactivate Staging App Layer

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Type DEACTIVATE_STAGING_APP_LAYER to confirm"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  # Shared with deploy-azure / deploy-app so this Azure-mutating workflow cannot run in
  # parallel with a deploy. Parallel ARM operations on the same RG caused ServerIsBusy
  # cascades in the May 2026 incident (#415).
  group: deploy-azure-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deactivate-staging-app-layer:
    if: github.event.inputs.confirmation == 'DEACTIVATE_STAGING_APP_LAYER'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Azure login (OIDC)
        uses: azure/login@v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # #405 safeguard (defense in depth — the deactivate SCRIPT also has an env guard): this
      # destructive, staging-only workflow tears down the App Service layer. The May 2026 incident
      # was exactly this kind of operation running against prod. Abort hard if the active context
      # is the production subscription, before any deletion happens.
      - name: Assert staging subscription
        shell: pwsh
        run: |
          $current = (az account show --query id -o tsv).Trim()
          if ($current -eq '5b3f760b-42d4-4d78-812c-c059278d1086') {
            throw "SAFETY ABORT: this workflow is authenticated against the PRODUCTION subscription (5b3f760b-...). It must only run against staging."
          }
          Write-Host "Subscription guard OK — active subscription $current is not production."

      - name: Deactivate staging app layer
        shell: pwsh
        run: |
          ./scripts/azure/deactivate-app-layer.ps1 `
            -SubscriptionId "${{ secrets.AZURE_SUBSCRIPTION_ID }}" `
            -EnvironmentName "staging" `
            -ResourceGroupName "${{ vars.AZURE_RESOURCE_GROUP }}" `
            -DisableAlerts $true

      - name: Summarize result
        run: |
          echo "Staging app layer deactivated." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Preserved resources include PostgreSQL storage, Key Vault, Log Analytics, App Insights, and other non-App-Service assets in the staging resource group." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "PostgreSQL compute was stopped as part of the deactivation flow." >> "$GITHUB_STEP_SUMMARY"

  confirmation-mismatch:
    if: github.event.inputs.confirmation != 'DEACTIVATE_STAGING_APP_LAYER'
    runs-on: ubuntu-latest
    steps:
      - name: Fail on missing confirmation
        run: |
          echo "Confirmation text did not match DEACTIVATE_STAGING_APP_LAYER." >&2
          exit 1
