name: Model Comparison Benchmark

on:
  workflow_dispatch:
    inputs:
      repeat:
        description: "Iterations per model per case"
        required: true
        default: "20"
      models:
        description: "Models (label:deployment,...)"
        required: true
        default: "chat:a2-assessment-stage-gpt-5.3-chat,mini:a2-assessment-stage-gpt-5.4-mini,nano:a-2-assessment-stage-gpt-5.4-nano"
      cases:
        description: "Cases to run (comma-separated, leave blank for default)"
        required: false
        default: ""

jobs:
  benchmark:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npm run prisma:generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost/dummy

      - name: Validate workflow inputs
        shell: bash
        run: |
          set -euo pipefail
          if ! [[ "$INPUT_REPEAT" =~ ^[0-9]+$ ]] || [ "$INPUT_REPEAT" -lt 1 ] || [ "$INPUT_REPEAT" -gt 100 ]; then
            echo "repeat must be an integer from 1 to 100." >&2
            exit 1
          fi
          if ! [[ "$INPUT_MODELS" =~ ^[A-Za-z0-9_.-]+:[A-Za-z0-9_.-]+(,[A-Za-z0-9_.-]+:[A-Za-z0-9_.-]+)*$ ]]; then
            echo "models must be comma-separated label:deployment entries using alphanumeric, dot, underscore, and hyphen characters." >&2
            exit 1
          fi
          if [ -n "$INPUT_CASES" ] && ! [[ "$INPUT_CASES" =~ ^[A-Za-z0-9_.-]+(,[A-Za-z0-9_.-]+)*$ ]]; then
            echo "cases must be blank or comma-separated case ids using alphanumeric, dot, underscore, and hyphen characters." >&2
            exit 1
          fi
        env:
          INPUT_CASES: ${{ inputs.cases }}
          INPUT_REPEAT: ${{ inputs.repeat }}
          INPUT_MODELS: ${{ inputs.models }}

      - name: Run benchmark
        shell: bash
        run: |
          set -euo pipefail
          args=(
            "--repeat=$INPUT_REPEAT"
            "--models=$INPUT_MODELS"
            "--output=doc/benchmarks/model-comparison-$(date +%Y-%m-%d)"
          )
          if [ -n "$INPUT_CASES" ]; then
            args+=("--cases=$INPUT_CASES")
          fi
          npx tsx src/scripts/runModelComparisonBenchmark.ts "${args[@]}"
        env:
          INPUT_CASES: ${{ inputs.cases }}
          INPUT_REPEAT: ${{ inputs.repeat }}
          INPUT_MODELS: ${{ inputs.models }}
          LLM_MODE: azure_openai
          AZURE_OPENAI_DEPLOYMENT: benchmark-override
          AZURE_OPENAI_ENDPOINT: ${{ vars.BENCHMARK_AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.BENCHMARK_AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_VERSION: "2025-01-01-preview"
          AZURE_OPENAI_TIMEOUT_MS: "120000"
          AZURE_OPENAI_TEMPERATURE: "0"
          AZURE_OPENAI_MAX_TOKENS: "1200"
          AZURE_OPENAI_TOKEN_LIMIT_PARAMETER: auto
          DATABASE_URL: postgresql://dummy:dummy@localhost/dummy
          AUTH_MODE: mock

      - name: Upload results as artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: benchmark-results-${{ github.run_id }}
          path: doc/benchmarks/
          retention-days: 90
