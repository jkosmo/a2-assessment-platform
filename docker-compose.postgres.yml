services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: a2_app
      POSTGRES_PASSWORD: a2_local_dev_password
      POSTGRES_DB: a2_assessment_dev
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    volumes:
      - a2_assessment_postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres/init:/docker-entrypoint-initdb.d:ro

volumes:
  a2_assessment_postgres_data:
