<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seksjoner – A2 Content</title>
    <link rel="stylesheet" href="/static/shared.css" />
    <link rel="stylesheet" href="/static/loading.css" />
    <link rel="stylesheet" href="/static/toast.css" />
    <style>
      /* #745: rad som holder status-filter-pillene og kurs-dropdownen på samme linje. */
      .list-filters-row { display: flex; flex-wrap: wrap; align-items: center; gap: var(--space-2); margin-bottom: var(--space-2); }
      .list-filters-row .list-filters { margin-bottom: 0; }
      .list-course-filter { display: flex; align-items: center; gap: 8px; }
      .list-course-filter label { font-size: 13px; font-weight: 600; color: var(--color-meta); }
      .list-course-select {
        width: auto;
        min-height: 0;
        padding: 5px 10px;
        font-size: 13px;
        font-family: inherit;
        border: 1px solid var(--color-border-soft);
        border-radius: var(--radius-card);
        background: var(--color-surface);
        color: var(--color-text);
        max-width: 260px;
      }
      .list-course-select:focus { outline: 2px solid var(--color-blue); outline-offset: 1px; border-color: transparent; }

      .content-area-nav {
        display: flex;
        gap: 0;
        border-bottom: 2px solid var(--color-border-soft);
        margin-bottom: var(--space-3);
        /* Stay visible while editing a (long) section so the workspace tabs don't scroll away. */
        position: sticky;
        top: 0;
        z-index: 10;
        background: var(--color-bg, #f7f8fa);
      }
      .content-area-nav-link {
        padding: 10px var(--space-2);
        font-size: 14px;
        font-weight: 600;
        color: var(--color-meta);
        text-decoration: none;
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
        white-space: nowrap;
      }
      .content-area-nav-link:hover { color: var(--color-text); }
      .content-area-nav-link.active { color: var(--color-link-active); border-bottom-color: var(--color-blue); }

      .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-2);
        margin-bottom: var(--space-3);
        flex-wrap: wrap;
      }
      .page-header h1 { margin: 0; font-size: 22px; }
      .page-header-back { margin-bottom: var(--space-2); }
      .back-link { font-size: 13px; color: var(--color-meta); text-decoration: none; }
      .back-link:hover { color: var(--color-text); }

      .sections-table-wrap { overflow-x: auto; border: 1px solid var(--color-table-wrap-border); border-radius: var(--radius-card); }
      .sections-table { width: 100%; border-collapse: collapse; font-size: 14px; }
      /* #705-UX: tittel-kolonnen er den fleksible (min-width, ikke width:100% som klemte de andre
         kolonnene + tvang handlingsknappene til å stable seg vertikalt). */
      .sections-table .col-title { min-width: 220px; font-weight: 600; }
      .sections-table th, .sections-table td { text-align: left; padding: 10px var(--space-2); border-bottom: 1px solid var(--color-border-soft); vertical-align: middle; }
      .sections-table th { font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--color-meta); }
      /* col-actions er en vanlig celle (ikke flex) så den vokser til knapperaden og holder den
         horisontal. .row-action-btn + .row-actions arves nå fra shared.css (felles utseende). */
      .sections-table .col-actions { white-space: nowrap; }

      /* Editor */
      .section-editor { max-width: 720px; }
      .editor-field { margin-bottom: var(--space-2); }
      .editor-field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; }
      .editor-field input[type="text"] { width: 100%; padding: 8px; border: 1px solid var(--color-border-soft); border-radius: var(--radius-btn); font-size: 14px; }
      .lang-tabs { display: flex; gap: 4px; margin-bottom: var(--space-2); }
      .lang-tab { padding: 6px 12px; font-size: 13px; font-weight: 600; border: 1px solid var(--color-border-soft); background: none; border-radius: var(--radius-btn); cursor: pointer; color: var(--color-meta); }
      .lang-tab.active { color: var(--color-link-active); border-color: var(--color-blue); background: var(--color-row-hover); }
      .editor-cols { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-2); align-items: stretch; }
      @media (max-width: 760px) { .editor-cols { grid-template-columns: 1fr; } }
      /* #662: each column is a flex column so the markdown textarea and the preview pane fill the
         grid row, which stretches to the taller of the two. The result: the input grows to match
         the preview's height instead of staying pinned at its 320px minimum. */
      .editor-cols > div { display: flex; flex-direction: column; min-width: 0; }
      .editor-cols textarea { width: 100%; min-height: 320px; flex: 1 1 auto; padding: var(--space-2); border: 1px solid var(--color-border-soft); border-radius: var(--radius-card); font-family: var(--font-mono, monospace); font-size: 13px; resize: vertical; }
      /* #679: hold pane-toolbaren (inkl. «Last opp bilde») synlig i høy editor. Festes UNDER den
         sticky workspace-tab-baren (.content-area-nav: top:0, ~44px) så den ikke havner bak den. */
      .editor-pane-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--color-meta); margin-bottom: 4px; position: sticky; top: 46px; z-index: 5; background: var(--color-surface); padding: 6px 0; }
      .preview-pane { border: 1px solid var(--color-border-soft); border-radius: var(--radius-card); padding: var(--space-2); min-height: 320px; flex: 1 1 auto; overflow-y: auto; }
      .preview-pane img { max-width: 100%; height: auto; }
      .preview-pane iframe { max-width: 100%; }
      .editor-actions { margin-top: var(--space-3); display: flex; gap: var(--space-2); align-items: center; }
      .editor-status { font-size: 13px; color: var(--color-meta); }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-nav" data-i18n="nav.skipToContent">Skip to main content</a>
    <main id="main-content" class="layout-container">
      <div class="page-top-bar">
        <nav id="workspaceNav" class="workspace-nav"></nav>
        <div class="locale-picker">
          <span id="appVersion" class="version-badge">…</span>
          <label for="localeSelect" class="sr-only">Language</label>
          <select id="localeSelect" class="locale-select-compact"></select>
        </div>
      </div>

      <nav id="contentAreaNav" class="content-area-nav" aria-label="Innholdsadministrasjon">
        <a href="/admin-content/courses" class="content-area-nav-link" id="navKurs">Kurs</a>
        <a href="/admin-content" class="content-area-nav-link" id="navModuler">Moduler</a>
        <a href="/admin-content/sections" class="content-area-nav-link active" id="navSeksjoner">Seksjoner</a>
        <a href="/admin-content/classes" class="content-area-nav-link" id="navKlasser">Klasser</a>
        <a href="/admin-content/calibration" class="content-area-nav-link" id="navKalibrering" hidden>Kalibrering</a>
      </nav>

      <div id="pageContent">
        <div class="page-loading">Laster…</div>
      </div>
    </main>

    <script type="module" src="/static/admin-content-sections.js"></script>
    <script type="module" src="/static/workspace-help.js"></script>
  </body>
</html>
