<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A2 Participant Test Console</title>
    <style>
      body { font-family: Segoe UI, Arial, sans-serif; margin: 24px; background: #f7f8fb; color: #222; }
      .card { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      label { display: block; margin-bottom: 6px; font-size: 13px; color: #444; }
      input, textarea, select, button { width: 100%; padding: 8px; box-sizing: border-box; }
      button { cursor: pointer; }
      button:disabled { cursor: not-allowed; opacity: 0.55; }
      button:not(:disabled):active { transform: translateY(1px); }
      button:focus-visible { outline: 3px solid #8db0ff; outline-offset: 2px; }
      .small { font-size: 12px; color: #666; }
      .assessment-progress { margin-top: 10px; font-size: 16px; font-weight: 600; color: #1b2a4a; }
      .assessment-progress-seconds { margin-top: 6px; font-size: 28px; font-weight: 800; color: #134ec9; letter-spacing: 0.3px; }
      pre { white-space: pre-wrap; word-break: break-word; background: #111; color: #d9ffd9; padding: 10px; border-radius: 8px; }
      .inline { display: inline-block; width: auto; }
      .module-list { display: grid; gap: 10px; margin-top: 12px; }
      .module-card { text-align: left; border: 1px solid #b9c2d0; border-radius: 10px; padding: 10px; background: #fdfefe; }
      .module-card:hover { border-color: #4361ee; }
      .module-card:focus-visible { outline: 3px solid #8db0ff; outline-offset: 2px; }
      .module-card.selected { border-color: #134ec9; background: #eaf1ff; }
      .module-title { font-weight: 600; }
      .module-meta { font-size: 12px; color: #5c6a7a; margin-top: 4px; }
      .selected-badge { display: inline-block; margin-top: 8px; font-size: 11px; font-weight: 600; color: #0d3f9e; }
      .selected-module-summary { border: 1px solid #cfd7e6; background: #f8fbff; border-radius: 8px; padding: 8px; min-height: 37px; }
      .section-locked { opacity: 0.75; }
      .hidden { display: none; }
      .button-busy { opacity: 0.75; position: relative; border-color: #134ec9; background: #eaf1ff; }
      .button-busy::after { content: " ..."; }
    </style>
  </head>
  <body>
    <h1 data-i18n="page.title"></h1>
    <p class="small" data-i18n="page.subtitle"></p>
    <p class="small"><span data-i18n="page.versionLabel"></span> <strong id="appVersion">loading...</strong></p>
    <p class="small"><a href="/appeal-handler" data-i18n="page.appealWorkspaceLink"></a></p>
    <div class="card">
      <div class="row">
        <div>
          <label for="localeSelect" data-i18n="locale.label"></label>
          <select id="localeSelect"></select>
        </div>
      </div>
    </div>

    <section class="card">
      <h3 data-i18n="identity.title"></h3>
      <div class="row">
        <div><label data-i18n="identity.userId"></label><input id="userId" value="participant-1" /></div>
        <div><label data-i18n="identity.email"></label><input id="email" value="participant@company.com" /></div>
      </div>
      <div class="row">
        <div><label data-i18n="identity.name"></label><input id="name" value="Platform Participant" /></div>
        <div><label data-i18n="identity.department"></label><input id="department" value="Consulting" /></div>
      </div>
      <div>
        <label data-i18n="identity.roles"></label>
        <input id="roles" value="PARTICIPANT" />
      </div>
      <div id="mockRolePresetContainer">
        <label for="mockRolePreset" data-i18n="identity.rolePreset"></label>
        <select id="mockRolePreset"></select>
        <div class="small" id="mockRolePresetHint"></div>
      </div>
      <button id="loadMe" data-i18n="identity.loadMe"></button>
    </section>

    <section class="card">
      <h3 data-i18n="modules.title"></h3>
      <button id="loadModules" data-i18n="modules.load"></button>
      <div class="small" data-i18n="modules.summaryHint"></div>
      <div class="small" id="moduleSelectionHint" data-i18n="modules.selectToUnlock"></div>
      <div id="moduleList" class="module-list"></div>
    </section>

    <section class="card hidden" id="submissionSection">
      <h3 data-i18n="submission.title"></h3>
      <div>
        <label data-i18n="submission.selectedModule"></label>
        <div id="selectedModuleDisplay" class="selected-module-summary"></div>
        <input id="selectedModuleId" type="hidden" />
      </div>
      <div><label data-i18n="submission.rawText"></label><textarea id="rawText" rows="5"></textarea></div>
      <div><label data-i18n="submission.reflection"></label><textarea id="reflectionText" rows="4"></textarea></div>
      <div><label data-i18n="submission.promptExcerpt"></label><textarea id="promptExcerpt" rows="3"></textarea></div>
      <div class="small" id="draftStatus"></div>
      <label><input class="inline" type="checkbox" id="ack" checked /> <span data-i18n="submission.ack"></span></label>
      <button id="createSubmission" data-i18n="submission.create"></button>
      <div class="small" id="submissionValidationHint"></div>
      <div class="small"><span data-i18n="submission.submissionId"></span> <span id="submissionId">-</span></div>
    </section>

    <section class="card hidden" id="mcqSection">
      <h3 data-i18n="mcq.title"></h3>
      <div id="mcqQuestions"></div>
      <button id="submitMcq" data-i18n="mcq.submit"></button>
      <div class="small"><span data-i18n="mcq.attemptId"></span> <span id="attemptId">-</span></div>
    </section>

    <section class="card hidden" id="assessmentSection">
      <h3 data-i18n="assessment.title"></h3>
      <div class="small" id="assessmentGateHint"></div>
      <button id="queueAssessment" data-i18n="assessment.queue"></button>
      <button id="checkAssessment" data-i18n="assessment.checkAssessment"></button>
      <div class="small" id="checkAssessmentHint"></div>
      <div id="assessmentProgressStatus" class="assessment-progress"></div>
      <div id="assessmentProgressSeconds" class="assessment-progress-seconds hidden"></div>
      <button id="checkResult" data-i18n="assessment.checkResult"></button>
      <div class="small" data-i18n="assessment.resultSummary"></div>
      <pre id="resultSummary"></pre>
      <button id="resetSubmissionFlow" data-i18n="submission.resetFlow"></button>
    </section>

    <section class="card hidden" id="appealSection">
      <h3 data-i18n="appeal.title"></h3>
      <div class="small" id="appealGateHint"></div>
      <div><label data-i18n="appeal.reason"></label><textarea id="appealReason" rows="3"></textarea></div>
      <button id="createAppeal" data-i18n="appeal.create"></button>
      <div class="small" id="appealSubmittedStatus"></div>
      <div class="small"><span data-i18n="appeal.appealId"></span> <span id="appealId">-</span></div>
    </section>

    <section class="card">
      <h3 data-i18n="history.title"></h3>
      <button id="loadHistory" data-i18n="history.load"></button>
      <pre id="historySummary"></pre>
    </section>

    <section class="card">
      <h3 data-i18n="output.title"></h3>
      <pre id="output"></pre>
    </section>

    <script src="/static/i18n/participant-translations.js" type="module"></script>
    <script src="/static/participant.js" type="module"></script>
  </body>
  </html>
