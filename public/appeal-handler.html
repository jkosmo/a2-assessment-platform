<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A2 Appeal Handler Workspace</title>
    <link rel="stylesheet" href="/static/shared.css" />
    <style>
      .inline { display: inline-block; width: auto; }
      .queue-table-wrap { overflow-x: auto; border: 1px solid var(--color-table-wrap-border); border-radius: var(--space-1); margin-top: calc(var(--space-1) * 1.25); max-height: 420px; overflow-y: auto; }
      table { width: 100%; border-collapse: collapse; min-width: 980px; }
      th, td { border-bottom: 1px solid var(--color-table-border); padding: var(--space-1); font-size: 12px; text-align: left; vertical-align: top; }
      tr.selected { background: var(--color-row-selected); }
      tr:hover { background: var(--color-row-hover); }
      .queue-toolbar { display: grid; grid-template-columns: 2fr 2fr 1fr 1fr; gap: var(--space-2); align-items: end; }
    </style>
  </head>
  <body>
    <div class="layout-container">
    <h1 data-i18n="appealPage.title"></h1>
    <p class="small" data-i18n="appealPage.subtitle"></p>
    <p class="small"><span data-i18n="appealPage.versionLabel"></span> <strong id="appVersion">loading...</strong></p>
    <nav id="workspaceNav" class="workspace-nav"></nav>

    <section class="card">
      <div class="row">
        <div>
          <label for="localeSelect" data-i18n="locale.label"></label>
          <select id="localeSelect"></select>
        </div>
      </div>
    </section>

    <section class="card">
      <h3 data-i18n="identity.title"></h3>
      <div class="row">
        <div><label data-i18n="identity.userId"></label><input id="userId" value="handler-1" /></div>
        <div><label data-i18n="identity.email"></label><input id="email" value="appeal.handler@company.com" /></div>
      </div>
      <div class="row">
        <div><label data-i18n="identity.name"></label><input id="name" value="Platform Appeal Handler" /></div>
        <div><label data-i18n="identity.department"></label><input id="department" value="Quality" /></div>
      </div>
      <div>
        <label data-i18n="identity.roles"></label>
        <input id="roles" value="APPEAL_HANDLER" />
      </div>
      <div id="mockRolePresetContainer">
        <label for="mockRolePreset" data-i18n="identity.rolePreset"></label>
        <select id="mockRolePreset"></select>
        <div class="small" id="mockRolePresetHint"></div>
      </div>
      <button id="loadMe" class="btn-secondary" data-i18n="identity.loadMe"></button>
    </section>

    <section class="card">
      <h3 data-i18n="appealHandler.title"></h3>
      <div class="queue-toolbar">
        <div>
          <fieldset class="pill-group-fieldset">
            <legend id="appealHandlerStatusFilterLegend" data-i18n="appealHandler.statusFilter"></legend>
            <div
              id="appealHandlerStatusFilter"
              class="pill-group"
              role="group"
              aria-labelledby="appealHandlerStatusFilterLegend"
            ></div>
          </fieldset>
          <div class="small" data-i18n="appealHandler.statusHint"></div>
        </div>
        <div>
          <fieldset class="pill-group-fieldset">
            <legend id="appealHandlerManualReviewFilterLegend" data-i18n="appealHandler.manualReviewFilter"></legend>
            <div
              id="appealHandlerManualReviewFilter"
              class="pill-group"
              role="group"
              aria-labelledby="appealHandlerManualReviewFilterLegend"
            ></div>
          </fieldset>
          <div class="small" data-i18n="appealHandler.manualReviewHint"></div>
        </div>
        <div>
          <label for="queueSearch" data-i18n="appealHandler.search"></label>
          <input id="queueSearch" data-i18n-placeholder="appealHandler.searchPlaceholder" />
        </div>
        <div>
          <label data-i18n="appealHandler.queueLimit"></label>
          <input id="queueLimit" readonly value="50" />
        </div>
      </div>
      <div class="row" style="margin-top: calc(var(--space-1) * 1.25);">
        <div><button id="loadAppealQueue" class="btn-secondary" data-i18n="appealHandler.loadQueue"></button></div>
        <div class="small"><span data-i18n="appealHandler.queueCount"></span> <strong id="queueCount">0</strong></div>
      </div>
      <div id="appealHandlerMessage" class="small"></div>
      <div class="queue-table-wrap">
        <table>
          <thead>
            <tr>
              <th data-i18n="appealHandler.table.appealId"></th>
              <th data-i18n="appealHandler.table.status"></th>
              <th data-i18n="appealHandler.table.manualReview"></th>
              <th data-i18n="appealHandler.table.participant"></th>
              <th data-i18n="appealHandler.table.module"></th>
              <th data-i18n="appealHandler.table.submittedAt"></th>
              <th data-i18n="appealHandler.table.createdAt"></th>
              <th data-i18n="appealHandler.table.claimedAt"></th>
              <th data-i18n="appealHandler.table.resolvedAt"></th>
              <th data-i18n="appealHandler.table.sla"></th>
            </tr>
          </thead>
          <tbody id="appealQueueBody"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h3 data-i18n="appealHandler.detailsTitle"></h3>
      <div><label data-i18n="appealHandler.selectedAppeal"></label><input id="handlerSelectedAppealId" readonly value="-" /></div>
      <pre id="appealHandlerDetails"></pre>
      <div><label data-i18n="appealHandler.resolveDecision"></label><textarea id="handlerDecisionReason" rows="2" aria-describedby="resolveValidationMessage"></textarea></div>
      <div><label data-i18n="appealHandler.resolveNote"></label><textarea id="handlerResolutionNote" rows="2" aria-describedby="resolveValidationMessage"></textarea></div>
      <div>
        <label for="handlerPassFailTotal" data-i18n="appealHandler.passFail"></label>
        <select id="handlerPassFailTotal">
          <option value="true" data-i18n="appealHandler.pass"></option>
          <option value="false" data-i18n="appealHandler.fail"></option>
        </select>
      </div>
      <div class="small" id="resolveValidationMessage"></div>
      <div class="row">
        <div><button id="claimAppeal" class="btn-secondary" data-i18n="appealHandler.claim"></button></div>
        <div><button id="resolveAppeal" class="btn-primary" data-i18n="appealHandler.resolve"></button></div>
      </div>
    </section>

    <section class="card">
      <h3 data-i18n="output.title"></h3>
      <div class="small" id="outputStatus"></div>
      <pre id="output"></pre>
    </section>

    </div>
    <script src="/static/i18n/appeal-handler-translations.js" type="module"></script>
    <script src="/static/appeal-handler.js" type="module"></script>
  </body>
</html>
