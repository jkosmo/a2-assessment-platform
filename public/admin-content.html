<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A2 Content Workspace</title>
    <link rel="stylesheet" href="/static/shared.css" />
    <link rel="stylesheet" href="/static/loading.css" />
    <link rel="stylesheet" href="/static/toast.css" />
    <style>
      /* ── Shell layout ─────────────────────────────────────────────────────── */
      .shell-header { display: flex; justify-content: space-between; align-items: baseline; gap: var(--space-2); flex-wrap: wrap; margin-bottom: var(--space-2); }
      .shell-header h1 { margin: 0; font-size: 22px; }
      .advanced-link { font-size: 13px; color: var(--color-meta); text-decoration: none; white-space: nowrap; }
      .advanced-link:hover { color: var(--color-link-active); text-decoration: underline; }

      .workspace-shell { display: grid; grid-template-columns: 1fr 380px; gap: var(--space-2); align-items: start; }
      /* #360 (200% zoom): bump fra 900px → 1024px slik at 1920×1080 + 200% zoom (effektiv
         960px) trigger stablet layout. Sticky-preview er borte globalt (se preview-pane
         CSS), så ingen stacking-overrides her — bare grid-direction. */
      @media (max-width: 1024px) { .workspace-shell { grid-template-columns: 1fr; } }

      /* ── Preview pane ─────────────────────────────────────────────────────── */
      /* v1.1.92 (#360 follow-up): bring back position: sticky, but ONLY in dual-column
         (viewport > 1024px). The overlap bug from v1.1.86-v1.1.89 was specific to
         single-column where chat-pane (later in DOM) painted ON TOP of sticky preview.
         In dual-column the panes are in different grid columns — no vertical overlap
         possible — so sticky is safe and useful (preview follows the user while they
         work in chat). Single-column keeps `position: static` (default) to avoid the
         original stacking-context bug.
         v1.1.78 history: removed max-height + overflow-y:auto so preview grows naturally. */
      @media (min-width: 1025px) {
        .preview-pane { position: sticky; top: var(--space-2); }
      }
      /* Locale bar only shown when a module is loaded (JS adds .visible) */
      .preview-locale-bar { display: none; gap: 4px; margin-bottom: var(--space-1); }
      .preview-locale-bar.visible { display: flex; }
      .preview-locale-btn { background: var(--color-surface); border: 1px solid var(--color-border-soft); border-radius: 999px; padding: 4px 12px; font-size: 12px; font-weight: 600; color: var(--color-meta); cursor: pointer; }
      .preview-locale-btn.active { background: var(--color-blue-light); border-color: var(--color-blue); color: var(--color-link-active); }
      .preview-locale-btn:hover:not(.active) { border-color: var(--color-link-hover-border); color: var(--color-text); }

      .preview-module-header { display: flex; justify-content: space-between; align-items: flex-start; gap: var(--space-1); margin-bottom: 8px; }
      .preview-module-title { font-size: 18px; font-weight: 700; color: var(--color-text); }
      .preview-description { font-size: 13px; color: var(--color-meta); margin: 0 0 8px; }
      .preview-version-chain { font-size: 12px; color: var(--color-link-active); font-weight: 600; margin: 0 0 var(--space-1); }
      .preview-section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-meta); margin: var(--space-1) 0 4px; }
      .preview-text-block { font-size: 14px; color: var(--color-text); line-height: 1.6; white-space: pre-wrap; background: var(--color-module-summary-bg); border: 1px solid var(--color-module-summary-border); border-radius: var(--radius-card); padding: var(--space-1); }
      .preview-text-secondary { color: var(--color-meta); }
      .preview-meta { font-size: 12px; color: var(--color-meta); margin: 8px 0 0; }
      .preview-mcq-list { display: flex; flex-direction: column; gap: var(--space-1); margin-top: 8px; }
      .preview-mcq-item { background: var(--color-module-summary-bg); border: 1px solid var(--color-module-summary-border); border-radius: var(--radius-card); padding: var(--space-1); }
      .preview-mcq-question-header { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-meta); margin-bottom: 6px; }
      .preview-mcq-stem { font-size: 14px; font-weight: 600; color: var(--color-text); margin-bottom: 8px; line-height: 1.5; }
      .preview-mcq-options { margin: 0 0 10px 18px; padding: 0; display: flex; flex-direction: column; gap: 4px; }
      .preview-mcq-option { color: var(--color-text); line-height: 1.45; }
      .preview-mcq-option.correct { font-weight: 700; color: var(--color-link-active); }
      .preview-mcq-meta { display: flex; flex-direction: column; gap: 2px; font-size: 12px; color: var(--color-meta); margin-top: 6px; }
      .preview-mcq-meta-label { font-weight: 700; color: var(--color-text); }
      .preview-empty { color: var(--color-meta); font-style: italic; }

      /* Preview edit mode — fields match preview visual language exactly */
      .preview-pane--editing .preview-locale-btn { opacity: 0.4; pointer-events: none; }
      .preview-edit-title {
        font-size: 18px; font-weight: 700; color: var(--color-text);
        border: none; border-bottom: 2px solid var(--color-blue);
        background: transparent; width: 100%; outline: none;
        font-family: inherit; padding: 0 0 2px;
      }
      .preview-edit-textarea {
        display: block; width: 100%; box-sizing: border-box;
        font-size: 14px; font-family: inherit; line-height: 1.6;
        color: var(--color-text); background: var(--color-module-summary-bg);
        border: 1px solid var(--color-blue); border-radius: var(--radius-card);
        padding: var(--space-1); resize: vertical; min-height: 100px;
        white-space: pre-wrap;
      }
      .preview-edit-textarea--secondary { color: var(--color-meta); }
      .preview-edit-textarea--compact { min-height: 72px; }
      .preview-edit-input {
        width: 100%; min-width: 0; box-sizing: border-box;
        font-size: 14px; font-family: inherit; line-height: 1.45;
        color: var(--color-text); background: #fff;
        border: 1px solid var(--color-blue); border-radius: var(--radius-card);
        padding: 9px 12px;
      }
      .preview-edit-mcq-list { display: flex; flex-direction: column; gap: var(--space-1); margin-top: 8px; }
      .preview-edit-mcq-item {
        background: var(--color-module-summary-bg);
        border: 1px solid var(--color-blue);
        border-radius: var(--radius-card);
        padding: var(--space-1);
      }
      .preview-edit-mcq-options { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
      .preview-edit-mcq-option { display: grid; grid-template-columns: 18px 1fr; gap: 8px; align-items: center; }
      .preview-edit-mcq-help { font-size: 12px; color: var(--color-meta); }
      .preview-edit-actions {
        display: flex; gap: var(--space-1); justify-content: flex-end;
        margin-top: var(--space-2); padding-top: var(--space-1);
        border-top: 1px solid var(--color-border-soft);
      }

      /* Module status badges (shared with advanced editor) */
      .module-status-badge { display: inline-flex; align-items: center; border-radius: 999px; padding: 4px 12px; font-size: 12px; font-weight: 700; white-space: nowrap; }
      .module-status-badge.live { background: #e6f4ea; color: #12613a; }
      .module-status-badge.draft { background: #fff3db; color: #7a4b00; }
      .module-status-badge.shell { background: #edf1f7; color: #42526b; }

      /* ── Chat pane ────────────────────────────────────────────────────────── */
      .chat-pane { display: flex; flex-direction: column; min-height: 60vh; }
      .chat-messages { flex: 1; display: flex; flex-direction: column; gap: var(--space-1); padding: var(--space-1); overflow-y: auto; min-height: 200px; }

      .chat-msg { display: flex; }
      /* v1.1.93 (#360 follow-up): stack bubble + choices vertically for bot messages so
         choice pills appear BELOW the bubble. Previously default flex-direction: row
         squeezed choices into a narrow right column when bubble was wide (blueprint
         editor, criteria editor, etc.), causing button text to wrap character-by-character.
         User messages stay row-based since they typically have no choices. */
      .chat-msg--bot { flex-direction: column; align-items: flex-start; }
      .chat-msg--user { justify-content: flex-end; }

      .chat-bubble { max-width: 90%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; }
      .chat-msg--bot .chat-bubble { background: var(--color-blue-light); color: var(--color-text); border-bottom-left-radius: 4px; }
      .chat-msg--user .chat-bubble { background: var(--color-navy); color: #fff; border-bottom-right-radius: 4px; }
      .chat-bubble--progress { display: flex; align-items: center; gap: 8px; color: var(--color-meta); }

      .chat-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--color-border-soft); border-top-color: var(--color-blue); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Contain bubble content so long error strings don't cause horizontal scroll */
      .chat-pane { overflow: hidden; }
      .chat-bubble { overflow-wrap: break-word; word-break: break-word; min-width: 0; }

      .chat-choices { display: flex; flex-wrap: wrap; gap: 6px; padding: 6px var(--space-1) var(--space-1); max-width: 100%; }
      .chat-choices--column { flex-direction: column; align-items: flex-start; }
      .chat-choice-btn { width: auto !important; max-width: 100% !important; padding: 6px 14px !important; font-size: 13px !important; border-radius: 999px !important; transition: transform 80ms ease-out; }
      /* v1.1.97: subtle tactile feedback on click — knappen "presses" et øyeblikk så
         brukeren ser at klikket ble registrert før neste bot-melding kommer. Pure CSS,
         ingen JS, ingen påvirkning på funksjonalitet. */
      .chat-choice-btn:active:not(:disabled) { transform: scale(0.96); }
      .chat-choice-btn:disabled { opacity: 0.45; cursor: default; }

      .module-list { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
      .module-list-item { font-size: 13px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

      /* ── Chat full-width forms (rendered outside bubble so they fill pane width) */
      .chat-form-row { display: flex; gap: 8px; align-items: center; padding: 4px var(--space-1) var(--space-1); }
      .chat-form-col { display: flex; flex-direction: column; gap: 8px; padding: 4px var(--space-1) var(--space-1); }
      .chat-text-input { flex: 1 1 0; width: 0; padding: 9px 12px; border: 1px solid var(--color-border-soft); border-radius: var(--radius-card); font-size: 14px; font-family: inherit; background: #fff; color: var(--color-text); }
      .chat-text-input:focus { outline: 2px solid var(--color-blue); outline-offset: 1px; border-color: transparent; }
      .chat-textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--color-border-soft); border-radius: var(--radius-card); font-size: 13px; font-family: inherit; background: #fff; color: var(--color-text); resize: vertical; box-sizing: border-box; }
      .chat-textarea:focus { outline: 2px solid var(--color-blue); outline-offset: 1px; border-color: transparent; }

      /* B1 (#448): editable Vurderingsplan card */
      .bp-editor { margin-top: 8px; font-size: 13px; }
      .bp-section-label { margin: 8px 0 4px; font-weight: 600; }
      .bp-objectives, .bp-topics { list-style: none; margin: 0 0 4px; padding: 0; display: flex; flex-direction: column; gap: 4px; }
      .bp-row { display: flex; align-items: center; gap: 6px; }
      .bp-row .chat-textarea { flex: 1 1 auto; padding: 6px 10px; font-size: 13px; min-height: auto; }
      .bp-objective-remove, .bp-topic-remove { background: none; border: none; color: var(--color-meta); cursor: pointer; padding: 2px 8px; font-size: 16px; line-height: 1; border-radius: 4px; width: auto; }
      .bp-objective-remove:hover, .bp-topic-remove:hover { background: var(--color-error-bg, #fde7e7); color: var(--color-error, #b00020); }
      .bp-add-btn { background: none; border: 1px dashed var(--color-border-soft); color: var(--color-meta); padding: 6px 10px; font-size: 13px; font-weight: 500; border-radius: var(--radius-card); cursor: pointer; width: auto; margin: 4px 0 8px; }
      .bp-add-btn:hover { color: var(--color-link-active); border-color: var(--color-blue); }
      .bp-mcq-suggestion { margin: 8px 0 4px; color: var(--color-meta); font-size: 12px; }
      .bp-notes { margin: 6px 0 0; font-size: 12px; color: var(--color-meta); font-style: italic; }

      /* B2 (#449 redesign v1.1.77): Vurderingskriterier rendered in preview-pane as
         content. Read-only (.preview-criterion-*) when viewing; editable (.vk-*) inside
         direct-edit mode. Both live in the preview-pane (~600-900px wide on desktop) so
         layouts no longer need to squeeze into a narrow chat-bubble. */

      /* Read-only view */
      .preview-criteria-list { list-style: none; margin: 6px 0 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
      .preview-criterion { border: 1px solid var(--color-border-soft); border-radius: var(--radius-card); padding: 10px 12px; background: rgba(255,255,255,0.5); }
      .preview-criterion-header { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin-bottom: 4px; }
      .preview-criterion-title { font-weight: 700; font-size: 14px; color: var(--color-text); }
      .preview-criterion-weight { font-size: 12px; color: var(--color-meta); white-space: nowrap; font-weight: 600; }
      .preview-criteria-loading { color: var(--color-meta); font-style: italic; padding: 8px 0; }
      .preview-criterion-desc { margin: 4px 0 0; font-size: 13px; color: var(--color-text); line-height: 1.4; }
      .preview-criterion-visible { margin: 4px 0 0; font-size: 12px; color: var(--color-link-active); }
      .preview-criteria-total { margin: 10px 0 0; font-size: 13px; color: var(--color-text); }

      /* Editable view (direct-edit mode) */
      .vk-list { list-style: none; margin: 6px 0 0; padding: 0; display: flex; flex-direction: column; gap: 10px; }
      .vk-card { border: 1px solid var(--color-border-soft); border-radius: var(--radius-card); padding: 12px 14px; background: rgba(255,255,255,0.7); display: flex; flex-direction: column; gap: 8px; }
      .vk-row { display: flex; align-items: center; gap: 8px; }
      .vk-label { flex: 1 1 auto; min-width: 0; padding: 7px 10px; border: 1px solid var(--color-border-soft); border-radius: var(--radius-card); font-size: 13px; font-weight: 600; background: #fff; }
      .vk-label:focus { outline: 2px solid var(--color-blue); outline-offset: 1px; border-color: transparent; }
      .vk-remove { flex-shrink: 0; background: none; border: none; color: var(--color-meta); cursor: pointer; padding: 6px 10px; font-size: 18px; line-height: 1; border-radius: 4px; width: auto; min-width: 44px; min-height: 44px; }
      .vk-remove:hover { background: var(--color-error-bg, #fde7e7); color: var(--color-error, #b00020); }
      .vk-description { width: 100%; padding: 7px 10px; font-size: 13px; box-sizing: border-box; border: 1px solid var(--color-border-soft); border-radius: var(--radius-card); resize: vertical; min-height: 50px; background: #fff; font-family: inherit; }
      .vk-description:focus { outline: 2px solid var(--color-blue); outline-offset: 1px; border-color: transparent; }
      .vk-weight-label { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--color-text); }
      .vk-weight-label > span:first-child { white-space: nowrap; flex-shrink: 0; color: var(--color-meta); }
      .vk-weight { flex: 1 1 auto; min-width: 120px; max-width: 320px; }
      .vk-weight-value { min-width: 30px; font-weight: 700; color: var(--color-text); text-align: right; }
      .vk-visible-label { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--color-text); white-space: nowrap; cursor: pointer; }
      .vk-visible-label input { margin: 0; flex-shrink: 0; width: 18px; height: 18px; cursor: pointer; }
      .vk-total { margin: 12px 0 4px; font-size: 13px; color: var(--color-text); }
      .vk-total-value { font-weight: 700; }
      .vk-actions-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
      .vk-add-btn { background: none; border: 1px dashed var(--color-border-soft); color: var(--color-meta); padding: 8px 14px; font-size: 13px; font-weight: 500; border-radius: var(--radius-card); cursor: pointer; width: auto; }
      .vk-add-btn:hover { color: var(--color-link-active); border-color: var(--color-blue); }
      /* v1.1.78: "Generer på nytt fra planen" trenger mer visuell vekt — det er en vanlig
         action etter at brukeren har endret oppgavetekst eller bare ønsker friske
         forslag. Solid bakgrunn + tydeligere kontrast. */
      .vk-add-btn.vk-regenerate { background: var(--color-blue-light); border: 1px solid var(--color-blue); border-style: solid; color: var(--color-link-active); font-weight: 600; }
      .vk-add-btn.vk-regenerate:hover { background: var(--color-blue); color: #fff; border-color: var(--color-blue); }
      /* Override global button{width:100%} for chat form submit buttons */
      .chat-submit-btn { width: auto !important; white-space: nowrap; flex-shrink: 0; align-self: flex-end; }

      /* B3 (#450) drift-banner — rendered in preview-pane above the criteria section
         when the blueprint has changed after the rubric was generated. */
      .drift-banner {
        margin: 16px 0;
        padding: 14px 16px;
        background: #fff7e6;
        border: 1px solid #f5c97a;
        border-left: 4px solid #d18b1a;
        border-radius: var(--radius-card);
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .drift-banner-message { display: flex; gap: 10px; align-items: flex-start; }
      .drift-banner-icon { font-size: 18px; line-height: 1.2; flex-shrink: 0; }
      .drift-banner-message p { margin: 0; font-size: 14px; color: var(--color-text); line-height: 1.45; }
      .drift-banner-actions { display: flex; flex-wrap: wrap; gap: 8px; }
      .drift-banner-actions button { width: auto; padding: 6px 14px; font-size: 13px; }

      /* B3 (#450) drift-diff modal — full-screen overlay with per-change rows. Mirrors the
         existing chat-modal pattern (overlay + centred card) but laid out for review,
         not data entry. */
      .drift-diff-overlay {
        position: fixed; inset: 0; z-index: 1000;
        background: rgba(15, 23, 42, 0.55);
        display: flex; align-items: center; justify-content: center;
        padding: 24px;
      }
      .drift-diff-modal {
        background: var(--color-bg-card, #fff);
        border-radius: var(--radius-card);
        box-shadow: 0 12px 28px rgba(0,0,0,0.18);
        max-width: 720px;
        width: 100%;
        max-height: 90vh;
        display: flex; flex-direction: column;
        overflow: hidden;
      }
      .drift-diff-modal-header {
        display: flex; align-items: center; justify-content: space-between;
        gap: 12px;
        padding: 16px 20px;
        border-bottom: 1px solid var(--color-border-soft);
      }
      .drift-diff-modal-header h2 { margin: 0; font-size: 18px; }
      .drift-diff-close {
        background: none; border: none; font-size: 22px; line-height: 1; cursor: pointer;
        color: var(--color-meta); padding: 4px 8px; width: auto;
      }
      .drift-diff-close:hover { color: var(--color-text); }
      .drift-diff-modal-summary { margin: 0; padding: 12px 20px 0; font-size: 13px; color: var(--color-meta); }
      .drift-diff-list { list-style: none; margin: 0; padding: 12px 20px; overflow-y: auto; flex: 1; }
      .drift-diff-row { margin-bottom: 10px; padding: 10px 12px; border-radius: 6px; border: 1px solid var(--color-border-soft); }
      .drift-diff-row label { display: flex; gap: 10px; align-items: flex-start; cursor: pointer; }
      .drift-diff-row input[type="checkbox"] { margin-top: 4px; flex-shrink: 0; width: 18px; height: 18px; cursor: pointer; }
      .drift-diff-row-body { flex: 1; display: flex; flex-direction: column; gap: 4px; font-size: 14px; }
      .drift-diff-row-tag { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.4px; width: fit-content; }
      .drift-diff-row-tag--added { background: #dcf5e6; color: #1f7a3e; }
      .drift-diff-row-tag--removed { background: #fde2e2; color: #a32424; }
      .drift-diff-row-tag--changed { background: #fdf2c8; color: #7a5e10; }
      .drift-diff-row--added { background: #f3fbf6; }
      .drift-diff-row--removed { background: #fcf3f3; }
      .drift-diff-row--changed { background: #fdfaee; }
      .drift-diff-row-desc { margin: 0; color: var(--color-meta); font-size: 13px; }
      .drift-diff-row-fieldchange { margin: 2px 0; font-size: 13px; color: var(--color-text); }
      .drift-diff-row-fieldchange em { color: var(--color-meta); font-style: normal; font-weight: 600; }
      .drift-diff-empty { margin: 20px; text-align: center; color: var(--color-meta); }
      .drift-diff-modal-footer {
        display: flex; justify-content: flex-end; gap: 8px;
        padding: 14px 20px;
        border-top: 1px solid var(--color-border-soft);
      }
      .drift-diff-modal-footer button { width: auto; padding: 8px 16px; }

      /* ── Module workspace header + mode switch ───────────────────────────── */
      .module-workspace-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-2);
        flex-wrap: wrap;
        margin-bottom: var(--space-2);
      }
      .module-mode-switch {
        display: inline-flex;
        background: var(--color-surface);
        border: 1px solid var(--color-border-soft);
        border-radius: 999px;
        padding: 2px;
        gap: 0;
      }
      .module-mode-btn {
        padding: 6px 18px;
        font-size: 13px;
        font-weight: 600;
        border: none;
        border-radius: 999px;
        background: none;
        color: var(--color-meta);
        cursor: pointer;
        white-space: nowrap;
      }
      .module-mode-btn.active {
        background: var(--color-blue);
        color: #fff;
        cursor: default;
      }
      .module-mode-btn:hover:not(.active) {
        background: var(--color-blue-light);
        color: var(--color-link-active);
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-nav" data-i18n="nav.skipToContent">Skip to main content</a>
    <main id="main-content" class="layout-container">

      <div class="page-top-bar">
        <nav id="workspaceNav" class="workspace-nav"></nav>
        <div class="locale-picker">
          <span id="appVersion" class="version-badge">…</span>
          <label for="localeSelect" class="sr-only">Language</label>
          <select id="localeSelect" class="locale-select-compact"></select>
        </div>
      </div>

      <div id="stateRail" class="state-rail" hidden aria-label="Modulstatus">
        <div class="state-rail-item">
          <span class="state-rail-label" data-i18n="stateRail.label.module">Modul</span>
          <span id="srModuleName" class="state-rail-value">—</span>
        </div>
        <span class="state-rail-sep" aria-hidden="true">·</span>
        <div class="state-rail-item">
          <span class="state-rail-label" data-i18n="stateRail.label.editing">Du redigerer</span>
          <span id="srEditing"></span>
        </div>
        <span class="state-rail-sep" aria-hidden="true">·</span>
        <div class="state-rail-item">
          <span class="state-rail-label" data-i18n="stateRail.label.live">Live nå</span>
          <span id="srLive"></span>
        </div>
        <span class="state-rail-sep" aria-hidden="true">·</span>
        <div class="state-rail-item">
          <span class="state-rail-label" data-i18n="stateRail.label.changes">Endringer</span>
          <span id="srChanges"></span>
        </div>
        <span class="state-rail-sep" aria-hidden="true">·</span>
        <div class="state-rail-item">
          <span class="state-rail-label" data-i18n="stateRail.label.preview">Preview viser</span>
          <span id="srPreview"></span>
        </div>
        <span class="state-rail-sep" aria-hidden="true">·</span>
        <div class="state-rail-item">
          <span class="state-rail-label" data-i18n="stateRail.label.language">Språk</span>
          <span id="srLang" class="state-rail-value"></span>
        </div>
      </div>

      <div role="note" style="border:1px solid #f5c37f;background:#fffbf0;border-radius:var(--radius-card);padding:var(--space-1) var(--space-2);margin-top:var(--space-2);margin-bottom:var(--space-2)">
        <strong data-i18n="adminContent.privacy.warning.title">Special category data risk</strong>
        <p class="small" style="margin-top:4px;color:var(--color-meta)" data-i18n="adminContent.privacy.warning.body">
          Participants may include health information, political views, or other special category data in free-text submissions.
        </p>
      </div>

      <div class="module-workspace-header">
        <h1 id="moduleWorkspaceTitle" style="margin:0; font-size:22px" data-i18n="shell.page.title">Content Workspace</h1>
        <div class="module-mode-switch" role="group" aria-label="Redigeringsmodus">
          <button class="module-mode-btn active" id="modeSwitchConversation" data-i18n="workspace.mode.conversation" aria-pressed="true">Samtale</button>
          <button class="module-mode-btn" id="modeSwitchAdvanced" data-i18n="workspace.mode.advanced" aria-pressed="false">Avansert</button>
        </div>
      </div>

      <div class="workspace-shell">

        <!-- Preview pane -->
        <section class="card preview-pane" aria-label="Modulforhåndsvisning">
          <div id="previewLocaleBar" class="preview-locale-bar"></div>
          <div id="previewContent">
            <p class="preview-empty">Ingen modul valgt.</p>
          </div>
        </section>

        <!-- Chat pane -->
        <section class="card chat-pane" aria-label="Samtaleassistent">
          <div id="chatMessages" class="chat-messages" role="log" aria-live="polite" aria-relevant="additions text" aria-atomic="false"></div>
          <div id="shellStatusAnnouncer" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>
        </section>

      </div>
    </main>
    <script type="module" src="/static/admin-content-shell.js"></script>
    <script type="module" src="/static/workspace-help.js"></script>
  </body>
</html>
