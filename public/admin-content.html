<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A2 Content Workspace</title>
    <link rel="stylesheet" href="/static/shared.css" />
    <link rel="stylesheet" href="/static/loading.css" />
    <link rel="stylesheet" href="/static/toast.css" />
    <style>
      /* ── Shell layout ─────────────────────────────────────────────────────── */
      .shell-header { display: flex; justify-content: space-between; align-items: baseline; gap: var(--space-2); flex-wrap: wrap; margin-bottom: var(--space-2); }
      .shell-header h1 { margin: 0; font-size: 22px; }
      .advanced-link { font-size: 13px; color: var(--color-meta); text-decoration: none; white-space: nowrap; }
      .advanced-link:hover { color: var(--color-link-active); text-decoration: underline; }

      .workspace-shell { display: grid; grid-template-columns: 1fr 380px; gap: var(--space-2); align-items: start; }
      @media (max-width: 900px) { .workspace-shell { grid-template-columns: 1fr; } }

      /* ── Preview pane ─────────────────────────────────────────────────────── */
      .preview-pane { position: sticky; top: var(--space-2); max-height: calc(100vh - var(--space-4)); overflow-y: auto; }
      /* Locale bar only shown when a module is loaded (JS adds .visible) */
      .preview-locale-bar { display: none; gap: 4px; margin-bottom: var(--space-1); }
      .preview-locale-bar.visible { display: flex; }
      .preview-locale-btn { background: var(--color-surface); border: 1px solid var(--color-border-soft); border-radius: 999px; padding: 4px 12px; font-size: 12px; font-weight: 600; color: var(--color-meta); cursor: pointer; }
      .preview-locale-btn.active { background: var(--color-blue-light); border-color: var(--color-blue); color: var(--color-link-active); }
      .preview-locale-btn:hover:not(.active) { border-color: var(--color-link-hover-border); color: var(--color-text); }

      .preview-module-header { display: flex; justify-content: space-between; align-items: flex-start; gap: var(--space-1); margin-bottom: 8px; }
      .preview-module-title { font-size: 18px; font-weight: 700; color: var(--color-text); }
      .preview-description { font-size: 13px; color: var(--color-meta); margin: 0 0 8px; }
      .preview-version-chain { font-size: 12px; color: var(--color-link-active); font-weight: 600; margin: 0 0 var(--space-1); }
      .preview-section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-meta); margin: var(--space-1) 0 4px; }
      .preview-text-block { font-size: 14px; color: var(--color-text); line-height: 1.6; white-space: pre-wrap; background: var(--color-module-summary-bg); border: 1px solid var(--color-module-summary-border); border-radius: var(--radius-card); padding: var(--space-1); }
      .preview-text-secondary { color: var(--color-meta); }
      .preview-meta { font-size: 12px; color: var(--color-meta); margin: 8px 0 0; }
      .preview-mcq-list { display: flex; flex-direction: column; gap: var(--space-1); margin-top: 8px; }
      .preview-mcq-item { background: var(--color-module-summary-bg); border: 1px solid var(--color-module-summary-border); border-radius: var(--radius-card); padding: var(--space-1); }
      .preview-mcq-question-header { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-meta); margin-bottom: 6px; }
      .preview-mcq-stem { font-size: 14px; font-weight: 600; color: var(--color-text); margin-bottom: 8px; line-height: 1.5; }
      .preview-mcq-options { margin: 0 0 10px 18px; padding: 0; display: flex; flex-direction: column; gap: 4px; }
      .preview-mcq-option { color: var(--color-text); line-height: 1.45; }
      .preview-mcq-option.correct { font-weight: 700; color: var(--color-link-active); }
      .preview-mcq-meta { display: flex; flex-direction: column; gap: 2px; font-size: 12px; color: var(--color-meta); margin-top: 6px; }
      .preview-mcq-meta-label { font-weight: 700; color: var(--color-text); }
      .preview-empty { color: var(--color-meta); font-style: italic; }

      /* Module status badges (shared with advanced editor) */
      .module-status-badge { display: inline-flex; align-items: center; border-radius: 999px; padding: 4px 12px; font-size: 12px; font-weight: 700; white-space: nowrap; }
      .module-status-badge.live { background: #e6f4ea; color: #12613a; }
      .module-status-badge.draft { background: #fff3db; color: #7a4b00; }
      .module-status-badge.shell { background: #edf1f7; color: #42526b; }

      /* ── Chat pane ────────────────────────────────────────────────────────── */
      .chat-pane { display: flex; flex-direction: column; min-height: 60vh; }
      .chat-messages { flex: 1; display: flex; flex-direction: column; gap: var(--space-1); padding: var(--space-1); overflow-y: auto; min-height: 200px; }

      .chat-msg { display: flex; }
      .chat-msg--bot { justify-content: flex-start; }
      .chat-msg--user { justify-content: flex-end; }

      .chat-bubble { max-width: 90%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; }
      .chat-msg--bot .chat-bubble { background: var(--color-blue-light); color: var(--color-text); border-bottom-left-radius: 4px; }
      .chat-msg--user .chat-bubble { background: var(--color-navy); color: #fff; border-bottom-right-radius: 4px; }
      .chat-bubble--progress { display: flex; align-items: center; gap: 8px; color: var(--color-meta); }

      .chat-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--color-border-soft); border-top-color: var(--color-blue); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Contain bubble content so long error strings don't cause horizontal scroll */
      .chat-pane { overflow: hidden; }
      .chat-bubble { overflow-wrap: break-word; word-break: break-word; min-width: 0; }

      .chat-choices { display: flex; flex-wrap: wrap; gap: 6px; padding: 6px var(--space-1) var(--space-1); max-width: 100%; }
      .chat-choices--column { flex-direction: column; align-items: flex-start; }
      .chat-choice-btn { width: auto !important; max-width: 100% !important; padding: 6px 14px !important; font-size: 13px !important; border-radius: 999px !important; }
      .chat-choice-btn:disabled { opacity: 0.45; cursor: default; }

      .module-list { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
      .module-list-item { font-size: 13px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

      /* ── Chat full-width forms (rendered outside bubble so they fill pane width) */
      .chat-form-row { display: flex; gap: 8px; align-items: center; padding: 4px var(--space-1) var(--space-1); }
      .chat-form-col { display: flex; flex-direction: column; gap: 8px; padding: 4px var(--space-1) var(--space-1); }
      .chat-text-input { flex: 1 1 0; width: 0; padding: 9px 12px; border: 1px solid var(--color-border-soft); border-radius: var(--radius-card); font-size: 14px; font-family: inherit; background: #fff; color: var(--color-text); }
      .chat-text-input:focus { outline: 2px solid var(--color-blue); outline-offset: 1px; border-color: transparent; }
      .chat-textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--color-border-soft); border-radius: var(--radius-card); font-size: 13px; font-family: inherit; background: #fff; color: var(--color-text); resize: vertical; box-sizing: border-box; }
      .chat-textarea:focus { outline: 2px solid var(--color-blue); outline-offset: 1px; border-color: transparent; }
      /* Override global button{width:100%} for chat form submit buttons */
      .chat-submit-btn { width: auto !important; white-space: nowrap; flex-shrink: 0; align-self: flex-end; }

      /* ── Module workspace header + mode switch ───────────────────────────── */
      .module-workspace-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-2);
        flex-wrap: wrap;
        margin-bottom: var(--space-2);
      }
      .module-mode-switch {
        display: inline-flex;
        background: var(--color-surface);
        border: 1px solid var(--color-border-soft);
        border-radius: 999px;
        padding: 2px;
        gap: 0;
      }
      .module-mode-btn {
        padding: 6px 18px;
        font-size: 13px;
        font-weight: 600;
        border: none;
        border-radius: 999px;
        background: none;
        color: var(--color-meta);
        cursor: pointer;
        white-space: nowrap;
      }
      .module-mode-btn.active {
        background: var(--color-blue);
        color: #fff;
        cursor: default;
      }
      .module-mode-btn:hover:not(.active) {
        background: var(--color-blue-light);
        color: var(--color-link-active);
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-nav" data-i18n="nav.skipToContent">Skip to main content</a>
    <main id="main-content" class="layout-container">

      <div class="page-top-bar">
        <nav id="workspaceNav" class="workspace-nav"></nav>
        <div class="locale-picker">
          <span id="appVersion" class="version-badge">…</span>
          <label for="localeSelect" class="sr-only">Language</label>
          <select id="localeSelect" class="locale-select-compact"></select>
        </div>
      </div>

      <div id="stateRail" class="state-rail" hidden aria-label="Modulstatus">
        <div class="state-rail-item">
          <span class="state-rail-label" data-i18n="stateRail.label.module">Modul</span>
          <span id="srModuleName" class="state-rail-value">—</span>
        </div>
        <span class="state-rail-sep" aria-hidden="true">·</span>
        <div class="state-rail-item">
          <span class="state-rail-label" data-i18n="stateRail.label.editing">Du redigerer</span>
          <span id="srEditing"></span>
        </div>
        <span class="state-rail-sep" aria-hidden="true">·</span>
        <div class="state-rail-item">
          <span class="state-rail-label" data-i18n="stateRail.label.live">Live nå</span>
          <span id="srLive"></span>
        </div>
        <span class="state-rail-sep" aria-hidden="true">·</span>
        <div class="state-rail-item">
          <span class="state-rail-label" data-i18n="stateRail.label.changes">Endringer</span>
          <span id="srChanges"></span>
        </div>
        <span class="state-rail-sep" aria-hidden="true">·</span>
        <div class="state-rail-item">
          <span class="state-rail-label" data-i18n="stateRail.label.preview">Preview viser</span>
          <span id="srPreview"></span>
        </div>
        <span class="state-rail-sep" aria-hidden="true">·</span>
        <div class="state-rail-item">
          <span class="state-rail-label" data-i18n="stateRail.label.language">Språk</span>
          <span id="srLang" class="state-rail-value"></span>
        </div>
      </div>

      <div role="note" style="border:1px solid #f5c37f;background:#fffbf0;border-radius:var(--radius-card);padding:var(--space-1) var(--space-2);margin-top:var(--space-2);margin-bottom:var(--space-2)">
        <strong data-i18n="adminContent.privacy.warning.title">Special category data risk</strong>
        <p class="small" style="margin-top:4px;color:var(--color-meta)" data-i18n="adminContent.privacy.warning.body">
          Participants may include health information, political views, or other special category data in free-text submissions.
        </p>
      </div>

      <div class="module-workspace-header">
        <h1 id="moduleWorkspaceTitle" style="margin:0; font-size:22px" data-i18n="shell.page.title">Content Workspace</h1>
        <div class="module-mode-switch" role="group" aria-label="Redigeringsmodus">
          <button class="module-mode-btn active" id="modeSwitchConversation" data-i18n="workspace.mode.conversation" aria-pressed="true">Samtale</button>
          <button class="module-mode-btn" id="modeSwitchAdvanced" data-i18n="workspace.mode.advanced" aria-pressed="false">Avansert</button>
        </div>
      </div>

      <div class="workspace-shell">

        <!-- Preview pane -->
        <section class="card preview-pane" aria-label="Modulforhåndsvisning">
          <div id="previewLocaleBar" class="preview-locale-bar"></div>
          <div id="previewContent">
            <p class="preview-empty">Ingen modul valgt.</p>
          </div>
        </section>

        <!-- Chat pane -->
        <section class="card chat-pane" aria-label="Samtaleassistent">
          <div id="chatMessages" class="chat-messages" role="log" aria-live="polite" aria-relevant="additions text" aria-atomic="false"></div>
          <div id="shellStatusAnnouncer" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>
        </section>

      </div>
    </main>
    <script type="module" src="/static/admin-content-shell.js"></script>
  </body>
</html>
