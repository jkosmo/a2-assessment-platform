<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A2 Completed Modules</title>
    <link rel="stylesheet" href="/static/shared.css" />
    <style>
      .table-wrap { overflow-x: auto; border: 1px solid var(--color-table-wrap-border); border-radius: var(--space-1); margin-top: calc(var(--space-1) * 1.25); max-height: 420px; overflow-y: auto; }
      table { width: 100%; border-collapse: collapse; min-width: 880px; }
      th, td { border-bottom: 1px solid var(--color-table-border); padding: var(--space-1); font-size: 12px; text-align: left; vertical-align: top; }
      tr:hover { background: var(--color-row-hover); }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-nav" data-i18n="nav.skipToContent">Skip to main content</a>
    <main id="main-content" class="layout-container">
    <div class="page-top-bar">
      <nav id="workspaceNav" class="workspace-nav"></nav>
      <div class="locale-picker">
        <span id="appVersion" class="version-badge">…</span>
        <label for="localeSelect" class="sr-only" data-i18n="locale.label">Language</label>
        <select id="localeSelect" class="locale-select-compact"></select>
      </div>
    </div>
    <h1 data-i18n="completedPage.title">Completed Modules</h1>
    <p class="small" data-i18n="completedPage.subtitle">See what you have finished and your latest score per module.</p>

    <section class="card mock-identity-card">
      <details class="mock-identity-panel">
        <summary><span data-i18n="identity.title">Test User</span><span class="mock-identity-dev-badge" data-i18n="identity.devOnlyBadge">Dev only</span></summary>
        <div class="mock-identity-panel-body">
          <div class="row">
            <div><label for="userId" data-i18n="identity.userId">User Id</label><input id="userId" value="participant-1" autocomplete="off" /></div>
            <div><label for="email" data-i18n="identity.email">Email</label><input id="email" value="participant@company.com" autocomplete="email" /></div>
          </div>
          <div class="row">
            <div><label for="name" data-i18n="identity.name">Name</label><input id="name" value="Platform Participant" autocomplete="name" /></div>
            <div><label for="department" data-i18n="identity.department">Department</label><input id="department" value="Consulting" autocomplete="organization" /></div>
          </div>
          <div>
            <label for="roles" data-i18n="identity.roles">Roles (comma-separated)</label>
            <input id="roles" value="PARTICIPANT" autocomplete="off" />
          </div>
          <div id="mockRolePresetContainer">
            <label for="mockRolePreset" data-i18n="identity.rolePreset">Role preset</label>
            <select id="mockRolePreset"></select>
            <div class="small" id="mockRolePresetHint"></div>
          </div>
          <button id="loadMe" class="btn-secondary" data-i18n="identity.loadMe">Show my user details</button>
        </div>
      </details>
    </section>

    <section class="card">
      <h2 data-i18n="completed.title">My completed modules</h2>
      <div class="row">
        <div>
          <label for="completedLimit" data-i18n="completed.limit">Max modules</label>
          <input id="completedLimit" type="number" min="1" max="200" value="50" />
        </div>
        <div>
          <label>&nbsp;</label>
          <button id="loadCompleted" class="btn-secondary" data-i18n="completed.load">Load completed modules</button>
        </div>
      </div>
      <div class="small" id="completedMeta"></div>
      <div class="table-wrap" tabindex="0" role="region" aria-label="Completed modules">
        <table>
          <thead>
            <tr>
              <th scope="col" data-i18n="completed.table.module">Module</th>
              <th scope="col" data-i18n="completed.table.completedAt">Completed</th>
              <th scope="col" data-i18n="completed.table.status">Status</th>
              <th scope="col" data-i18n="completed.table.score">Total score</th>
              <th scope="col" data-i18n="completed.table.passFail">Pass/fail</th>
              <th scope="col" data-i18n="completed.table.appeal">Appeal</th>
            </tr>
          </thead>
          <tbody id="completedBody"></tbody>
        </table>
      </div>
    </section>

    <section id="completedAppealSection" class="card" hidden>
      <h2 data-i18n="completed.appeal.title">Appeal a result</h2>
      <div class="small"><span data-i18n="completed.appeal.for">Module:</span> <strong id="appealModuleTitle"></strong></div>
      <div>
        <label for="completedAppealReason" data-i18n="completed.appeal.reasonLabel">Reason for appeal</label>
        <textarea id="completedAppealReason" rows="3"></textarea>
      </div>
      <div class="row" style="margin-top: var(--space-1);">
        <div><button id="completedSubmitAppeal" class="btn-primary" data-i18n="completed.appeal.submit">Submit appeal</button></div>
        <div><button id="completedCancelAppeal" class="btn-secondary" data-i18n="completed.appeal.cancel">Cancel</button></div>
      </div>
      <div class="small field-success" id="completedAppealFeedback" hidden></div>
    </section>

    <section class="card" id="courseCertSection">
      <h2 data-i18n="courseCert.title">Mine kursbevis</h2>
      <div id="courseCertList"></div>
    </section>

    <section class="card">
      <h2 data-i18n="output.title">System response</h2>
      <div class="small" id="outputStatus" aria-live="polite" aria-atomic="true"></div>
      <pre id="output" class="pre-content"></pre>
    </section>

    </main>
    <script src="/static/i18n/participant-completed-translations.js" type="module"></script>
    <script src="/static/participant-completed.js" type="module"></script>
    <script src="/static/workspace-help.js" type="module"></script>
  </body>
</html>
